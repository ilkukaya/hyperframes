<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAN ARION — SAY LESS | HyperFrames-style Promo</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script defer src="./main.js"></script>
</head>
<body>
  <main class="app">
    <section class="frame" aria-label="1080 by 1920 visualizer frame">
      <div class="bg-gradient"></div>
      <div class="bg-reflection"></div>
      <div class="bg-noise"></div>
      <canvas id="particles" width="1080" height="1920" aria-hidden="true"></canvas>

      <div class="scanlines" aria-hidden="true"></div>
      <div class="flare flare-a"></div>
      <div class="flare flare-b"></div>

      <div class="title-stack">
        <h1 id="line1" class="line">VAN ARION</h1>
        <h2 id="line2" class="line">SAY LESS</h2>
        <p id="line3" class="line">midnight in motion</p>
        <p id="line4" class="line">say less, feel more</p>
        <p id="line5" class="line">lost in the rhythm</p>
        <p id="line6" class="line">one night, no promises</p>
        <div id="line7" class="line cta">
          <p>listen now</p>
          <p class="sub">Spotify &amp; YouTube</p>
        </div>
      </div>

      <div class="vignette"></div>
    </section>

    <aside class="controls">
      <audio id="track" controls preload="auto" crossorigin="anonymous">
        <source src="../../say-less-van-arion-full-192k.mp3" type="audio/mpeg" />
      </audio>
      <button id="startBtn">Start 45s Promo Segment (00:48)</button>
      <p>Segment: 00:48 → 01:33 (45s). If local trimmed file exists, update source path in HTML.</p>
    </aside>
  </main>
</body>
</html>
